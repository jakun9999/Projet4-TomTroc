<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    # Le point d'entrée unique de votre application
    DocumentRoot /var/www/public
    HostnameLookups Off
    ServerName localhost

    <IfModule mod_headers.c>
        <FilesMatch "\.php$">
            Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
            Header set Pragma "no-cache"
        </FilesMatch>
    </IfModule>

    # Configuration du dossier public accessible au web
    <Directory /var/www/public>
        Options -Indexes +FollowSymLinks
        # On interdit les fichiers .htaccess pour booster les performances
        AllowOverride None 
        Require all granted

        # On active la réécriture DIRECTEMENT ICI
        RewriteEngine On

        # Empêcher Apache de bloquer l'accès aux vrais fichiers (images, css, javascript)
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d

        # Capturer ce que l'utilisateur écrit après le "/" et l'injecter secrètement dans ?action=
        RewriteRule ^([a-zA-Z0-9\-]+)$ index.php?action=$1 [L,QSA]
    </Directory>

    # Sécurité optionnelle (mais propre) : on interdit tout le reste par défaut
    <Directory /var/www>
        AllowOverride None
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>